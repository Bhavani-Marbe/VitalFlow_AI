<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Flow - Hospital Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 420px; padding: 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: white; }
        .logo { color: #dc3545; font-size: 2.5rem; font-weight: bold; text-align: center; margin-bottom: 30px; }
        .btn-danger { background-color: #dc3545; border: none; padding: 12px; border-radius: 8px; font-weight: 600; }
        .btn-danger:hover { background-color: #c82333; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><i class="bi bi-droplet-fill"></i> Vital Flow</div>
        <h5 class="text-center mb-4 text-muted">Hospital Staff Login</h5>
        
        {% if form.errors %}
            <div class="alert alert-danger small text-center">Invalid username or password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" name="username" class="form-control bg-light border-start-0" placeholder="Enter your username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-danger w-100 mb-3 shadow-sm">Login to Dashboard</button>
        </form>
        
        <div class="text-center">
            <a href="/" class="text-decoration-none small text-muted">Back to Public Site</a>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</body>
</html>
